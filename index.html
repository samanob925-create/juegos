<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body" style="background-image: url('inicio de sesión.jpg');">
    <div class="auth-container">
        <h2>BIENVENIDO</h2>
        <div class="auth-card">
            <div class="card-image-header"></div>
            <form id="loginForm">
                <input type="text" id="email" placeholder="Nombre de Usuario o Correo" required>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                
                <div class="recaptcha-box">
                    <input type="checkbox" id="robot" required>
                    <label for="robot">I'm not a robot</label>
                    <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" width="30">
                </div>

                <button type="submit" class="btn-dark">Iniciar sesión</button>
            </form>
            <div class="auth-links">
                <a href="registro.html">No tienes cuenta, crea una</a>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
